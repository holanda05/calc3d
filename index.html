<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Calc Pro</title>

<style>
body {
  background:#0e0e0e;
  color:#fff;
  font-family: monospace;
  max-width:400px;
  margin:auto;
  padding:20px;
}

.box {
  background:#1a1a1a;
  padding:15px;
  border-radius:12px;
  margin-bottom:12px;
}

input {
  width:100%;
  padding:10px;
  background:#111;
  border:1px solid #333;
  color:#fff;
  border-radius:8px;
}

button {
  width:100%;
  padding:14px;
  background:#00a86b;
  border:none;
  color:#fff;
  border-radius:10px;
  margin-top:10px;
}

.result {
  border:1px solid #00a86b;
  padding:15px;
  border-radius:12px;
  margin-top:10px;
}

.toggle {
  display:flex;
  gap:10px;
}

.toggle button {
  flex:1;
  background:#222;
}

.active {
  background:#00a86b !important;
}
</style>
</head>

<body>

<h2>3D Calc PRO</h2>

<div class="box">
Modo:
<div class="toggle">
<button id="realBtn" class="active" onclick="setModo('real')">REAL</button>
<button id="vendaBtn" onclick="setModo('venda')">VENDA</button>
</div>
</div>

<div class="box">
Preço do rolo (R$)
<input id="rolo" value="100">
</div>

<div class="box">
Energia (R$/kWh)
<input id="kwh" value="0.75">
</div>

<div class="box">
Peso (g)
<input id="g">
Tempo (h)
<input id="h">
</div>

<div class="box">
Custo por hora (R$)
<input id="hora" value="3">

Custo fixo (R$)
<input id="fixo" value="5">

Preço mínimo (R$)
<input id="min" value="15">
</div>

<div class="box">
Margem: <span id="mVal">50%</span>
<input type="range" min="0" max="300" value="50" id="m">
</div>

<button onclick="calc()">CALCULAR</button>

<div class="result" id="res" style="display:none"></div>

<script>
let modo = "real"

function setModo(m){
  modo = m
  realBtn.classList.remove("active")
  vendaBtn.classList.remove("active")
  if(m==="real") realBtn.classList.add("active")
  else vendaBtn.classList.add("active")
}

m.oninput = () => mVal.innerText = m.value+"%"

function calc(){

let rolo = roloInput()
let g = val("g")
let h = val("h")
let kwh = val("kwh")
let margem = val("m")/100
let hora = val("hora")
let fixo = val("fixo")
let min = val("min")

let custoFil = g*(rolo/1000)

let custoEner = (modo==="real")
? (120/1000)*h*kwh
: h*hora

let custo = custoFil + custoEner + fixo

let venda = custo + (custo*margem)

if(modo==="venda" && venda < min) venda = min

res.style.display="block"
res.innerHTML = `
<h3>💰 R$ ${venda.toFixed(2)}</h3>
Filamento: ${custoFil.toFixed(2)}<br>
Energia: ${custoEner.toFixed(2)}<br>
Custo: ${custo.toFixed(2)}<br>
Lucro: ${(venda-custo).toFixed(2)}
`
}

function val(id){
return parseFloat(document.getElementById(id).value)||0
}

function roloInput(){
return parseFloat(document.getElementById("rolo").value)||100
}
</script>

</body>
</html>
